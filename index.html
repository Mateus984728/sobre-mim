<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre Mim</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #000000; /* fundo preto */
            color: #ff0000; /* texto vermelho */
            margin: 40px;
        }

        h1 {
            text-align: center;
            font-size: 36px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #ff0000;
            padding-bottom: 10px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            margin: 10px 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #1a1a1a; /* fundo levemente diferente do preto */
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(255,0,0,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sobre mim</h1>
        <p>Meu nome é Mateus.</p>
        <p>Tenho 17 anos.</p>
        <p>Nasci em 19 de janeiro de 2009.</p>
        <p>Quero seguir uma carreira em Ciências da Computação.</p>
    </div>
</body>
</html>
